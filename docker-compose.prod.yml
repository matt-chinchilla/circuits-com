# Production override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# Changes from dev:
# - Frontend uses multi-stage prod build (nginx serving static files on port 80)
# - API runs uvicorn with 4 workers (no --reload)
# - No source code volume mounts on frontend
# - Nginx config updated to proxy to frontend on port 80

services:
  api:
    build:
      context: ./api
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    environment:
      # Real SMTP creds come from /opt/circuits-com/.env on EC2.
      # SMTP_HOST defaults to mail.hover.com on prod, but empty
      # SMTP_PASSWORD still triggers demo mode — won't actually send
      # until you populate the .env file.
      SMTP_HOST: ${SMTP_HOST:-mail.hover.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-no-reply@circuitcenter.ai}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@circuitcenter.ai}
      NOTIFY_RECIPIENTS: ${NOTIFY_RECIPIENTS:-mc@matthew-chirichella.com}
      # Admin JWT signing secret — MUST come from /opt/circuits-com/.env on prod.
      # Fail-fast (`:?`): never fall back to the base compose's public dev default
      # ("change-me-in-production"), which would make admin tokens forgeable by
      # anyone who reads the repo. Generate a strong value with:
      #   python -c "import secrets; print(secrets.token_urlsafe(48))"
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:?ADMIN_SECRET_KEY must be set in /opt/circuits-com/.env}
      # SQLAdmin creds — unreachable in prod (nginx routes /admin to the React
      # SPA instead), but fail-fast anyway so the base compose's public dev
      # default ("admin"/"admin") never ships as a live secret.
      ADMIN_USERNAME: ${SQLADMIN_USERNAME:?SQLADMIN_USERNAME must be set in /opt/circuits-com/.env}
      ADMIN_PASSWORD: ${SQLADMIN_PASSWORD:?SQLADMIN_PASSWORD must be set in /opt/circuits-com/.env}

  frontend:
    build:
      context: ./frontend
      target: prod
    ports: !reset []
    volumes: !reset []

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
