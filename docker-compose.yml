services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: circuits
      POSTGRES_USER: circuits
      POSTGRES_PASSWORD: circuits
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U circuits -d circuits"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://circuits:circuits@db:5432/circuits
      N8N_WEBHOOK_BASE_URL: http://n8n:5678
      ADMIN_USERNAME: john
      ADMIN_PASSWORD: circuits2026
      ADMIN_SECRET_KEY: change-me-in-production

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  n8n:
    build: ./n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      WEBHOOK_URL: http://n8n:5678
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  n8n-data:
