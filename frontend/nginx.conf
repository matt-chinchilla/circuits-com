server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Service worker + its registration script must always revalidate so
    # browsers pick up new caching rules on deploy. MUST precede the generic
    # .js immutable rule (exact-match location wins over regex regardless of
    # order, but keep it first for readability).
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|woff2|woff|ttf|png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
