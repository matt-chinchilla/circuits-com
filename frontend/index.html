<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Phosphor Light icon font — self-hosted to avoid CDN/firewall flakiness.
         Files live under frontend/public/fonts/phosphor-light/ (style.css + woff2
         + woff + ttf, ~ 1.2 MB committed). CSS uses relative ./Phosphor-Light.woff2
         which Vite serves from the public/ root at the deployed path. font-display:
         block (set in style.css) suppresses the FOUT — text-as-icon flash — while
         the woff2 loads. -->
    <link rel="preload" href="/fonts/phosphor-light/Phosphor-Light.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/phosphor-light/style.css" />
    <title>Circuits.com — Electronic Components Directory</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    (function(){
      if(location.pathname.startsWith('/admin'))return;
      var sid=sessionStorage.getItem('_cid');
      if(!sid){sid=crypto.randomUUID();sessionStorage.setItem('_cid',sid)}
      var last='';
      function t(p){
        if(p===last)return;last=p;
        var b=JSON.stringify({path:p,referrer:document.referrer||null,session_id:sid});
        if(navigator.sendBeacon){navigator.sendBeacon('/api/track',new Blob([b],{type:'application/json'}))}
        else{fetch('/api/track',{method:'POST',headers:{'Content-Type':'application/json'},body:b,keepalive:true}).catch(function(){})}
      }
      t(location.pathname);
      var ps=history.pushState;
      history.pushState=function(){ps.apply(this,arguments);t(location.pathname)};
      var rs=history.replaceState;
      history.replaceState=function(){rs.apply(this,arguments);t(location.pathname)};
      window.addEventListener('popstate',function(){t(location.pathname)});
    })();
    </script>
  </body>
</html>
