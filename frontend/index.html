<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Circuit Center — Electronic components directory. Compare prices and stock for 3,600+ ICs, MCUs, sensors, and more from 57 distributors. Find datasheets, check availability, and buy PCB components." />
    <meta name="keywords" content="electronic components, buy ICs, circuit components, PCB parts, integrated circuits, microcontrollers, sensors, capacitors, resistors, distributor comparison, component pricing, datasheets" />
    <!-- No static canonical: react-helmet-async sets a per-page canonical on
         every indexable route. A hardcoded one here was emitted on EVERY page
         (Helmet appends a 2nd rather than replacing a tag it doesn't own), so
         every page advertised two canonicals — home + the real one. Absent =
         self-referential, which is correct for the JS-less pre-hydration state
         and the few routes without an explicit canonical (2026-06-03). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Circuit Center" />
    <meta property="og:title" content="Circuit Center — The Integrated Circuits Directory" />
    <meta property="og:description" content="Compare prices and stock for 3,600+ electronic components from 57 distributors. ICs, MCUs, sensors, and more." />
    <meta property="og:url" content="https://circuitcenter.ai/" />
    <meta property="og:image" content="https://circuitcenter.ai/images/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Circuit Center — The Integrated Circuits Directory" />
    <meta name="twitter:description" content="Compare prices and stock for 3,600+ electronic components from 57 distributors." />
    <meta name="twitter:image" content="https://circuitcenter.ai/images/og-default.png" />
    <!-- Phosphor Light icon font — self-hosted to avoid CDN/firewall flakiness.
         Files live under frontend/public/fonts/phosphor-light/ (style.css + woff2
         + woff + ttf, ~ 1.2 MB committed). CSS uses relative ./Phosphor-Light.woff2
         which Vite serves from the public/ root at the deployed path. font-display:
         block (set in style.css) suppresses the FOUT — text-as-icon flash — while
         the woff2 loads. -->
    <link rel="preload" href="/fonts/phosphor-light/Phosphor-Light.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/phosphor-light/style.css" />
    <title>Circuit Center — The Integrated Circuits Directory</title>
    <script>
    // Category-page LCP preload (2026-05-30): when the request URL is
    // /category/<slug>, kick off the API fetch at HTML parse time so the
    // response lands in the Service Worker cache before React mounts. The
    // <Suspense> + useEffect chain otherwise can't fire the fetch until
    // ~400 ms after navigation start. Stores the in-flight promise on
    // window.__categoryPreload so api.ts can reuse it (avoids a duplicate
    // origin fetch when the SW cache is cold). URL params MUST match
    // api.getCategory's exact request (popular_per_page=500 etc).
    (function(){
      // Capture the LAST path segment: flat /category/<slug> OR nested
      // /category/<parent>/<child>. The child slug is globally unique and is
      // what api.getCategory fetches, so preloading it (not the parent) keeps
      // the cache-hit alive for subcategory pages too (2026-06-03 nested URLs).
      var m = location.pathname.match(/^\/category\/(?:[^\/?#]+\/)*([^\/?#]+)/);
      if (!m) return;
      var slug = m[1];
      var path = '/api/categories/' + slug + '/?popular_page=1&popular_per_page=500&parts_page=1&parts_per_page=500';
      try {
        window.__categoryPreload = {
          slug: slug,
          promise: fetch(path, { credentials: 'omit' }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
        };
      } catch (_) { /* ignore — page will fetch through axios */ }
    })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    (function(){
      if(location.pathname.startsWith('/admin'))return;
      var sid=sessionStorage.getItem('_cid');
      if(!sid){sid=crypto.randomUUID();sessionStorage.setItem('_cid',sid)}
      var last='';
      function t(p){
        if(p===last)return;last=p;
        var b=JSON.stringify({path:p,referrer:document.referrer||null,session_id:sid});
        if(navigator.sendBeacon){navigator.sendBeacon('/api/track',new Blob([b],{type:'application/json'}))}
        else{fetch('/api/track',{method:'POST',headers:{'Content-Type':'application/json'},body:b,keepalive:true}).catch(function(){})}
      }
      t(location.pathname);
      var ps=history.pushState;
      history.pushState=function(){ps.apply(this,arguments);t(location.pathname)};
      var rs=history.replaceState;
      history.replaceState=function(){rs.apply(this,arguments);t(location.pathname)};
      window.addEventListener('popstate',function(){t(location.pathname)});
    })();
    </script>
  </body>
</html>
