# ============================================================
# === BLOCK 3b: text_substitutions ============================
# ============================================================
# Non-import code edits that fall outside `import_substitutions` (which
# only handles `import ... from 'X'` and `lazy(() => import('X'))` lines).
# Currently a single edit: rewriting the inline `API_BASE_URL` declaration
# in api.ts to import-and-re-export the constant from the new shared
# constants file. This is a textual edit, not an import substitution, so
# it lives here — but it's still mechanically applicable from this table.
text_substitutions:
  - file: src/public/services/api.ts
    old: "export const API_BASE_URL = '/api';"
    new: "import { API_BASE_URL } from '@shared/services/constants';\nexport { API_BASE_URL };"
    purpose: 'Replace inline API_BASE_URL declaration with import+re-export from @shared/services/constants. Re-export keeps any future `import { API_BASE_URL } from "@public/services/api"` callers working.'

# ============================================================
# === BLOCK 4: scss_substitutions =============================
# ============================================================
# All component .module.scss files in public scope have already been
# migrated to `@use '@shared/styles/...'` paths in Cycle 1. Because the
# @shared alias is location-independent, those @use statements still
# resolve correctly after the consumer .scss files relocate. There are
# also no component-to-component .scss @use lines in public scope (only
# `@use 'sass:color'` in Navbar/GlowButton, which is built-in and
# unaffected by file location).
#
# Verified: `grep -rn "@use" src/pages/*.module.scss src/components/**/*.module.scss
# | grep -v '@shared'` returns only `@use "sass:color"` lines.
scss_substitutions: []

# ============================================================
# === BLOCK 5: alias config ===================================
# ============================================================
aliases:
