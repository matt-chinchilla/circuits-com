# ============================================================
# === Synthesizer notes (controller-added) ===================
# ============================================================
# 1. ADD @admin ALIAS — vite.config.ts + tsconfig.app.json. All cross-admin-subdir
#    hops should use @admin/... (depth-independent, cleaner than relative).
#
# 2. main.tsx import — `import { AuthProvider } from './contexts/AuthContext'`
#    becomes `import { AuthProvider } from '@admin/contexts/AuthContext'`.
#
# 3. App.tsx admin imports (~10 lazy() strings + 3 eager statics):
#    - eager: AdminLayout, ProtectedRoute → @admin/components/...
#    - eager: DemoProvider from contexts/DemoContext → @admin/contexts/DemoContext
#    - lazy(): all 12 admin page strings → @admin/pages/<name>/[<sub>]
#
# 4. SCSS @use rewrites for styles/admin/_variables.scss consumers (11 files):
#    Use depth-independent alias: @use '@admin/styles/variables' as *
#    (Easier than computing per-file relative paths for Plan B nested vs standalone.)
#
# 5. ORPHAN files — 4 total: PlaceholderPage, DataTable, StatCard, DemoToggle.
#    Recommend MOVE + FLAG (not delete) for user decision before merge.
#    Same precedent as Cycle 2's useAnimateOnScroll.
#
# 6. Sponsors has NO detail/ subdir — only list/ and form/.
