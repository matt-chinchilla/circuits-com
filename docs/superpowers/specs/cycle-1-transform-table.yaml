# === BLOCK 4: alias config ===
# Adds the @shared alias and removes the unused legacy @ alias.
# @public/@admin will be added in Cycles 2/3 respectively.
aliases:
  vite_config:
    add:
      - {'@shared': './src/shared'}
    remove:
      - {'@': './src'}
  tsconfig_paths:
    add:
      - {'@shared/*': ['src/shared/*']}
    remove:
      - {'@/*': ['src/*']}

# === BLOCK 5: post_execute_additions (Task 1.5 discoveries) ===
# Cartography was scoped to SCSS @use paths. TS/TSX side-effect imports of
# moved SCSS files (e.g., `import './styles/global.scss'` in main.tsx for
# global stylesheet injection) were not surveyed. Build failed at Task 1.5
# Step 1 because main.tsx still pointed to the old path. Fix applied
# directly during Task 1.5 verification.
#
# LESSON FOR CYCLES 2+3: cartography readers must include TS/TSX imports of
# moved files (components, hooks, services, types), not just SCSS @use paths.
# code-explorer prompts in those cycles already cover this for code paths,
# but we should also scan for SCSS-as-side-effect imports if any pages
# do similar global-stylesheet injection.
post_execute_additions:
  - file: src/main.tsx
    line: 6
    old: "import './styles/global.scss'"
    new: "import '@shared/styles/global.scss'"
    kind: ts_side_effect_import
    discovered_during: Task 1.5 build verification (vite build error)
    reason: cartography blind spot — TS imports of moved SCSS not in scope
