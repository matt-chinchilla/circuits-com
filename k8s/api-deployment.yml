apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: circuits
type: Opaque
stringData:
  DATABASE_URL: postgresql://circuits:circuits@db:5432/circuits
  N8N_WEBHOOK_BASE_URL: http://n8n:5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: circuits
  labels:
    app: api
    app.kubernetes.io/part-of: circuits
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: circuits-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: api-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: circuits
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
