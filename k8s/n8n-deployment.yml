apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: circuits
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: circuits
  labels:
    app: n8n
    app.kubernetes.io/part-of: circuits
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: circuits-n8n:latest
          ports:
            - containerPort: 5678
          env:
            - name: WEBHOOK_URL
              value: http://n8n:5678
            - name: N8N_HOST
              value: n8n
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: http
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: circuits
spec:
  selector:
    app: n8n
  ports:
    - port: 5678
      targetPort: 5678
