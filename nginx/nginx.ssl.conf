upstream frontend {
    server frontend:80;
}

upstream api {
    server api:8000;
}

# HTTP → HTTPS for every hostname we serve
server {
    listen 80;
    server_name circuits.com www.circuits.com circuits.matthew-chirichella.com;
    return 301 https://circuits.com$request_uri;
}

# 301: www.circuits.com → apex
server {
    listen 443 ssl;
    http2 on;
    server_name www.circuits.com;

    ssl_certificate /etc/letsencrypt/live/circuits.matthew-chirichella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circuits.matthew-chirichella.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://circuits.com$request_uri;
}

# 301: legacy subdomain → circuits.com (keeps old bookmarks / links working)
server {
    listen 443 ssl;
    http2 on;
    server_name circuits.matthew-chirichella.com;

    ssl_certificate /etc/letsencrypt/live/circuits.matthew-chirichella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circuits.matthew-chirichella.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://circuits.com$request_uri;
}

# Primary site — HTTP/2 enabled so the browser multiplexes all critical
# resources (CSS + JS chunks + the category API call) over ONE connection
# instead of serializing 18+ requests across 6 HTTP/1.1 connections.
# Was the dominant cause of the category-page LCP regression (2026-05-30):
# the SW-cached API response is 3 ms, but the fetch couldn't FIRE until
# 419 ms because chunk downloads were queued behind connection limits.
server {
    listen 443 ssl;
    http2 on;
    server_name circuits.com;

    ssl_certificate /etc/letsencrypt/live/circuits.matthew-chirichella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circuits.matthew-chirichella.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /sitemap.xml {
        proxy_pass http://api/api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// https://;
    }

    location /admin {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect http:// https://;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
