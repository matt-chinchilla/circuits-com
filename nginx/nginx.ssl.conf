upstream frontend {
    server frontend:80;
}

upstream api {
    server api:8000;
}

# Edge gzip — compress proxied responses (category JSON from the api
# upstream + the JS bundle from the frontend upstream). The inner
# frontend/nginx.conf gzip does NOT cover what THIS edge proxies, and
# gzip_proxied is required because nginx skips compressing proxied
# responses by default. Cold mobile category load 639 -> 189 KB (3.4x).
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

# HTTP → HTTPS for every hostname we serve
server {
    listen 80;
    server_name circuitcenter.ai www.circuitcenter.ai;
    return 301 https://circuitcenter.ai$request_uri;
}

# 301: www.circuitcenter.ai → apex
server {
    listen 443 ssl;
    http2 on;
    server_name www.circuitcenter.ai;

    ssl_certificate /etc/letsencrypt/live/circuitcenter.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circuitcenter.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://circuitcenter.ai$request_uri;
}

# Primary site — HTTP/2 enabled so the browser multiplexes all critical
# resources (CSS + JS chunks + the category API call) over ONE connection
# instead of serializing 18+ requests across 6 HTTP/1.1 connections.
# Was the dominant cause of the category-page LCP regression (2026-05-30):
# the SW-cached API response is 3 ms, but the fetch couldn't FIRE until
# 419 ms because chunk downloads were queued behind connection limits.
server {
    listen 443 ssl;
    http2 on;
    server_name circuitcenter.ai;

    ssl_certificate /etc/letsencrypt/live/circuitcenter.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circuitcenter.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /sitemap.xml {
        proxy_pass http://api/api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// https://;
    }

    location /admin {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect http:// https://;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
