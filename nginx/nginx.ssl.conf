upstream frontend {
    server frontend:80;
}

upstream api {
    server api:8000;
}

# HTTP → HTTPS for every hostname we serve
server {
    listen 80;
    server_name circuits.com www.circuits.com circuits.matthew-chirichella.com;
    return 301 https://circuits.com$request_uri;
}

# 301: www.circuits.com → apex
server {
    listen 443 ssl;
    server_name www.circuits.com;

    ssl_certificate /etc/letsencrypt/live/circuits.matthew-chirichella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circuits.matthew-chirichella.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://circuits.com$request_uri;
}

# 301: legacy subdomain → circuits.com (keeps old bookmarks / links working)
server {
    listen 443 ssl;
    server_name circuits.matthew-chirichella.com;

    ssl_certificate /etc/letsencrypt/live/circuits.matthew-chirichella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circuits.matthew-chirichella.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://circuits.com$request_uri;
}

# Primary site
server {
    listen 443 ssl;
    server_name circuits.com;

    ssl_certificate /etc/letsencrypt/live/circuits.matthew-chirichella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/circuits.matthew-chirichella.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http:// https://;
    }

    location /admin {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect http:// https://;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
