# Local dev reverse proxy (the prod edge config is nginx.ssl.conf).
#
# Upstreams are resolved through Docker's embedded DNS (127.0.0.11) via a
# `resolver` + a VARIABLE in proxy_pass. That forces nginx to RE-RESOLVE the
# service name on a short TTL instead of caching the IP once at config-load
# (the old `upstream { server frontend:80; }` blocks did the latter). So when
# `docker compose up --build <svc>` recreates a container with a NEW IP, nginx
# picks it up automatically — no more stale-upstream 502 after a local rebuild
# (which previously required a manual `docker compose restart nginx`; prod still
# sidesteps it via deploy.sh's nginx restart).
server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $api_upstream api;
        proxy_pass http://$api_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        set $frontend_upstream frontend;
        proxy_pass http://$frontend_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        set $frontend_upstream frontend;
        proxy_pass http://$frontend_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
